<!doctype html>
<html lang="ko" class="no-js">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- 파비콘/터치아이콘은 작은 전용 파일 사용 (OG는 hero-pet.jpg, 큰 스토어 아이콘은 스토어 콘솔에만 보관·웹 번들 제외) -->
    <link rel="icon" type="image/png" sizes="32x32" href="./assets/favicon.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="./assets/apple-touch-icon.png" />

    <!-- 정규 URL (커스텀 도메인 루트) -->
    <link rel="canonical" href="https://with-my-pet.com/" />

    <!-- LCP hero 이미지 조기 발견을 위한 preload (vite base '/' 반영, WebP) -->
    <!-- Hero 배경 실사(가장 큰 LCP 후보) — fetchpriority high -->
    <link
      rel="preload"
      as="image"
      type="image/webp"
      href="/assets/hero-puppy.webp"
      fetchpriority="high"
    />
    <!-- 마스코트 카드 -->
    <link rel="preload" as="image" type="image/webp" href="/assets/mascot-duo.webp" />

    <title>MyPet — 반려동물 필수정보 앱 | 내 주변 펫 시설 + AI 상담</title>
    <meta
      name="description"
      content="MyPet은 내 주변 동물병원·응급실·미용실·호텔·유치원·훈련소·용품점·카페·공원·식당을 거리순으로 찾고, AI에게 반려동물 건강·법률을 묻는 반려동물 필수정보 앱입니다. 지금 설치하세요."
    />

    <!-- 크롤링 허용 명시 + 키워드(네이버 일부 참고) + 작성자 -->
    <meta name="robots" content="index, follow" />
    <meta
      name="keywords"
      content="마이펫, MyPet, 반려동물 앱, 펫 시설, 동물병원 찾기, 내 주변 펫 시설, 펫 AI 상담, 반려동물 건강 상담, 펫 미용실, 펫 호텔, 강아지 고양이 시설"
    />
    <meta name="author" content="AI Soft" />

    <!-- 검색엔진 소유확인 (Phase C) -->
    <!-- 구글 Search Console -->
    <meta name="google-site-verification" content="HukniJyPisWIZ5-CsaCaGR_kJWon8N8rflY8RGyIJUg" />
    <!-- 네이버 서치어드바이저 (with-my-pet.com 속성) -->
    <meta name="naver-site-verification" content="d1068accac8ea609a172bc7bc0ef9663dcc65e3e" />

    <!-- Open Graph (크롤러는 상대경로 이미지를 못 읽으므로 절대 URL 사용) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="MyPet" />
    <meta property="og:url" content="https://with-my-pet.com/" />
    <meta property="og:title" content="MyPet — 반려동물 필수정보 앱" />
    <meta
      property="og:description"
      content="내 주변 펫 시설 검색과 AI 펫 건강·법률 상담을 한 앱에서. 전국 3만여 곳의 반려동물 시설 정보. iOS·Android 설치 가능."
    />
    <meta
      property="og:image"
      content="https://with-my-pet.com/assets/hero-pet.jpg"
    />
    <meta property="og:image:width" content="1080" />
    <meta property="og:image:height" content="810" />
    <meta property="og:image:alt" content="MyPet 반려동물 필수정보 앱" />
    <meta property="og:locale" content="ko_KR" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="MyPet — 반려동물 필수정보 앱" />
    <meta
      name="twitter:description"
      content="내 주변 펫 시설 검색과 AI 펫 건강·법률 상담을 한 앱에서."
    />
    <meta
      name="twitter:image"
      content="https://with-my-pet.com/assets/hero-pet.jpg"
    />

    <!-- Fonts: Quicksand 400/500/600/700 -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- 본문: Quicksand(둥근 라틴) + 헤딩: Jua(둥근 한글 디스플레이, 말랑한 인상). -->
    <link
      href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&family=Jua&display=swap"
      rel="stylesheet"
    />

    <!-- 구조화 데이터(JSON-LD) — 정적 스크립트라 JS 미실행 크롤러(네이버 Yeti)도 읽음.
         검색결과 앱 카드·지식 패널 가능성 + 엔티티 이해도↑. -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@graph": [
          {
            "@type": "WebSite",
            "@id": "https://with-my-pet.com/#website",
            "url": "https://with-my-pet.com/",
            "name": "MyPet",
            "description": "반려동물 필수정보 앱 — 내 주변 펫 시설 검색 + AI 펫 건강·법률 상담",
            "inLanguage": "ko-KR",
            "publisher": { "@id": "https://with-my-pet.com/#org" }
          },
          {
            "@type": "Organization",
            "@id": "https://with-my-pet.com/#org",
            "name": "AI Soft",
            "url": "https://with-my-pet.com/",
            "logo": "https://with-my-pet.com/assets/apple-touch-icon.png",
            "email": "longpapa82@gmail.com"
          },
          {
            "@type": "MobileApplication",
            "@id": "https://with-my-pet.com/#app",
            "name": "MyPet",
            "operatingSystem": "iOS, Android",
            "applicationCategory": "LifestyleApplication",
            "description": "내 주변 동물병원·미용실·호텔·유치원·훈련소·용품점·카페·공원·식당을 거리순으로 찾고, AI에게 반려동물 건강·법률을 묻는 반려동물 필수정보 앱.",
            "inLanguage": "ko-KR",
            "image": "https://with-my-pet.com/assets/hero-pet.jpg",
            "offers": { "@type": "Offer", "price": "0", "priceCurrency": "KRW" },
            "publisher": { "@id": "https://with-my-pet.com/#org" },
            "downloadUrl": [
              "https://apps.apple.com/kr/app/id6780117383",
              "https://play.google.com/store/apps/details?id=com.longpapa82.mypet"
            ]
          }
        ]
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <!-- 안전망: 프리렌더·JS 모두 실패해도 핵심 텍스트·설치 링크는 항상 노출(크롤러·접근성). -->
    <noscript>
      <h1>MyPet — 반려동물 필수정보 앱</h1>
      <p>
        내 주변 동물병원·미용실·호텔·유치원·훈련소·용품점·카페·공원·식당을 거리순으로 찾고,
        AI에게 반려동물 건강·법률을 바로 물어보세요. 전국 3만여 곳의 반려동물 시설 정보.
      </p>
      <ul>
        <li><a href="https://apps.apple.com/kr/app/id6780117383">App Store에서 받기 (iOS)</a></li>
        <li><a href="https://play.google.com/store/apps/details?id=com.longpapa82.mypet">Google Play에서 받기 (Android)</a></li>
      </ul>
    </noscript>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
